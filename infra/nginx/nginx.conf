# =============================================================================
# nginx — Main Configuration
# IntroToIslam Hetzner VPS
# =============================================================================
# This is the global nginx.conf. Virtual host configs per subdomain live in
# conf.d/*.conf and are included at the bottom of the http block.
# =============================================================================

# Number of worker processes — "auto" uses one per CPU core
worker_processes auto;

# Max open file descriptors per worker (should match system ulimit -n)
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    # Max simultaneous connections per worker
    worker_connections 4096;
    # Accept as many connections as possible in one epoll call
    multi_accept on;
    use epoll;
}

http {
    # -------------------------------------------------------------------------
    # MIME types
    # -------------------------------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # Logging format — structured JSON for easy parsing by Grafana Loki
    # -------------------------------------------------------------------------
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request":"$request",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"http_referrer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"upstream_addr":"$upstream_addr",'
            '"upstream_response_time":"$upstream_response_time"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # -------------------------------------------------------------------------
    # Performance
    # -------------------------------------------------------------------------
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75s;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;  # Hide nginx version from error pages and headers

    # -------------------------------------------------------------------------
    # Buffer sizes — tuned for CX32 (8 GB RAM)
    # -------------------------------------------------------------------------
    client_max_body_size     64m;   # Allow up to 64 MB uploads (Moodle course files)
    client_body_buffer_size  128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    # -------------------------------------------------------------------------
    # Timeouts
    # -------------------------------------------------------------------------
    client_body_timeout   30s;
    client_header_timeout 30s;
    send_timeout          60s;

    # -------------------------------------------------------------------------
    # Gzip compression — reduces payload for text-based assets
    # -------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # -------------------------------------------------------------------------
    # SSL — global defaults (overridden per-vhost as needed)
    # -------------------------------------------------------------------------
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # OCSP stapling — speeds up TLS handshake by caching cert status locally
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # -------------------------------------------------------------------------
    # Security headers (applied globally; individual vhosts can override)
    # -------------------------------------------------------------------------
    add_header X-Content-Type-Options   "nosniff"           always;
    add_header X-Frame-Options          "SAMEORIGIN"        always;
    add_header X-XSS-Protection         "1; mode=block"     always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # -------------------------------------------------------------------------
    # Rate limiting zones — protect against brute-force and DDoS
    # -------------------------------------------------------------------------
    # General API rate limit: 30 requests/second per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    # Login endpoint rate limit: 5 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    # -------------------------------------------------------------------------
    # Proxy settings — common defaults for upstream proxying
    # -------------------------------------------------------------------------
    proxy_http_version      1.1;
    proxy_set_header        Host               $host;
    proxy_set_header        X-Real-IP          $remote_addr;
    proxy_set_header        X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto  $scheme;
    proxy_set_header        Upgrade            $http_upgrade;
    proxy_set_header        Connection         "upgrade";
    proxy_cache_bypass      $http_upgrade;
    proxy_read_timeout      90s;
    proxy_connect_timeout   90s;
    proxy_send_timeout      90s;

    # -------------------------------------------------------------------------
    # Virtual host configurations — one file per subdomain
    # -------------------------------------------------------------------------
    include /etc/nginx/conf.d/*.conf;
}
