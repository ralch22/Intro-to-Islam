# =============================================================================
# book.introtoislam.org — Cal.com Scheduling
# Proxies to Cal.com container on port 3000 inside iti-network.
# =============================================================================

# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name book.introtoislam.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS — main vhost
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name book.introtoislam.org;

    # ---- SSL ----------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/book.introtoislam.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/book.introtoislam.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ---- Security headers ---------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # Cal.com embeds iframe for the booking widget — allow from parent domain
    add_header Content-Security-Policy "frame-ancestors 'self' https://introtoislam.org https://learn.introtoislam.org;" always;

    # ---- Rate limiting — protect booking API --------------------------------
    location ~ ^/api/ {
        limit_req zone=api burst=30 nodelay;
        proxy_pass http://calcom:3000;
    }

    # ---- Main proxy to Cal.com ----------------------------------------------
    location / {
        proxy_pass http://calcom:3000;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  https;

        # WebSocket support required for Cal.com real-time updates
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_read_timeout    90s;
        proxy_connect_timeout 90s;
        proxy_send_timeout    90s;
    }

    # ---- Cal.com embeddable widget (used by learn.introtoislam.org) ---------
    location /embed/ {
        proxy_pass http://calcom:3000/embed/;

        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto https;

        # Allow embedding from learn subdomain
        add_header Access-Control-Allow-Origin "https://learn.introtoislam.org";
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization";
    }
}
