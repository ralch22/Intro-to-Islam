# =============================================================================
# learn.introtoislam.org — Next.js PWA
# =============================================================================
# Current routing: proxies to Vercel-hosted deployment.
# Future migration path: when the Next.js container is added to docker-compose,
# change the upstream address to http://nextjs-pwa:3000 and remove the
# Vercel proxy_pass block.
# =============================================================================

# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name learn.introtoislam.org;

    # Let's Encrypt ACME http-01 challenge — must remain on port 80
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS — main vhost
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name learn.introtoislam.org;

    # ---- SSL ----------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/learn.introtoislam.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/learn.introtoislam.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ---- Security headers ---------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy   "default-src 'self' https: data: blob: 'unsafe-inline' 'unsafe-eval'; frame-ancestors 'self';" always;

    # ---- Proxy to Vercel deployment -----------------------------------------
    # PHASE 1 (current): traffic goes to the Vercel-hosted Next.js app.
    # PHASE 2 (post-migration): replace upstream with nextjs-pwa container.
    location / {
        # Phase 1 — Vercel proxy
        proxy_pass https://intro-to-islam-pwa.vercel.app;

        # Phase 2 — uncomment this and comment out the line above:
        # proxy_pass http://nextjs-pwa:3000;

        proxy_ssl_server_name on;  # Required when proxying to HTTPS upstream
        proxy_ssl_verify      off; # Vercel uses a valid cert; set to 'on' in Phase 2

        proxy_set_header Host               intro-to-islam-pwa.vercel.app;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  https;

        # WebSocket support (Next.js HMR and potential real-time features)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_read_timeout    90s;
        proxy_connect_timeout 90s;
        proxy_send_timeout    90s;

        # Cache static assets served by Vercel
        proxy_cache_bypass $http_pragma $http_authorization;
    }

    # PWA service worker must be served without cache so updates propagate
    location = /sw.js {
        proxy_pass https://intro-to-islam-pwa.vercel.app/sw.js;
        proxy_ssl_server_name on;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # Next.js image optimisation endpoint
    location /_next/image {
        proxy_pass https://intro-to-islam-pwa.vercel.app/_next/image;
        proxy_ssl_server_name on;
        proxy_cache_valid 200 7d;
    }
}
