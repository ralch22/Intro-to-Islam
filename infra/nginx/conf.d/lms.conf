# =============================================================================
# lms.introtoislam.org — Moodle LMS
# Proxies to Bitnami Moodle container on port 8080 inside iti-network.
# =============================================================================

# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name lms.introtoislam.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS — main vhost
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name lms.introtoislam.org;

    # ---- SSL ----------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/lms.introtoislam.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lms.introtoislam.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ---- Security headers ---------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # Moodle embeds iframes (Atto editor, activity modules) — allow same origin
    add_header X-Frame-Options "SAMEORIGIN" always;

    # ---- File upload size — allow large Moodle course archive uploads --------
    client_max_body_size 512m;

    # ---- Rate limiting — protect Moodle login page --------------------------
    location ~ ^/login/ {
        limit_req zone=login burst=10 nodelay;
        proxy_pass http://moodle:8080;
    }

    # ---- REST API rate limiting ----------------------------------------------
    location ~ ^/webservice/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://moodle:8080;
    }

    # ---- Main proxy ---------------------------------------------------------
    location / {
        proxy_pass http://moodle:8080;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  https;

        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # Moodle can be slow to respond during cron runs
        proxy_read_timeout    300s;
        proxy_connect_timeout 90s;
        proxy_send_timeout    300s;

        # Buffer settings to handle Moodle's larger pages
        proxy_buffers            16 64k;
        proxy_buffer_size        128k;
        proxy_busy_buffers_size  256k;
    }

    # ---- Moodle data directory — serve static files directly ----------------
    # Bitnami moodledata is internal; nginx handles public pluginfile.php proxy
    location /dataroot/ {
        internal;
        alias /bitnami/moodledata/;
    }

    # ---- Cache static assets (JS, CSS, images) ------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://moodle:8080;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
