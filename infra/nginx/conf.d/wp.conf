# =============================================================================
# introtoislam.org + www.introtoislam.org — WordPress Main Site
# Uses PHP-FPM FastCGI (wordpress container on port 9000).
# nginx itself serves static files from the wordpress_data volume.
# =============================================================================

# ---------------------------------------------------------------------------
# www → apex redirect
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name www.introtoislam.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://introtoislam.org$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.introtoislam.org;

    ssl_certificate     /etc/letsencrypt/live/introtoislam.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/introtoislam.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://introtoislam.org$request_uri;
}

# ---------------------------------------------------------------------------
# HTTP → HTTPS for apex domain
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name introtoislam.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS — main WordPress vhost
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name introtoislam.org;

    # ---- SSL ----------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/introtoislam.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/introtoislam.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ---- Security headers ---------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;

    # ---- Document root (WordPress files from named volume) ------------------
    root  /var/www/html;
    index index.php index.html;

    # ---- Upload size — allow theme/plugin ZIP uploads -----------------------
    client_max_body_size 64m;

    # ---- Rate limiting — protect wp-login.php --------------------------------
    location = /wp-login.php {
        limit_req zone=login burst=5 nodelay;
        fastcgi_pass wordpress:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PHP_VALUE "upload_max_filesize=64M \n post_max_size=64M";
    }

    # ---- Block access to sensitive WordPress files --------------------------
    location ~* /(?:uploads|files)/.*\.php$ {
        deny all;
    }

    location ~ /\.(ht|git|env) {
        deny all;
    }

    # ---- WordPress permalink support ----------------------------------------
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # ---- PHP files → FastCGI (WordPress PHP-FPM container) ------------------
    location ~ \.php$ {
        fastcgi_pass   wordpress:9000;
        fastcgi_index  index.php;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        include        fastcgi_params;

        fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param  PHP_VALUE        "upload_max_filesize=64M \n post_max_size=64M \n memory_limit=256M";

        # Pass real IP to PHP
        fastcgi_param  HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param  HTTPS on;

        fastcgi_read_timeout 300s;
    }

    # ---- Cache static assets -------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|mp4|webm|ogg)$ {
        expires    7d;
        add_header Cache-Control "public, max-age=604800";
        log_not_found off;
        access_log    off;
        try_files $uri =404;
    }

    # ---- WordPress XML-RPC — disable unless needed ---------------------------
    location = /xmlrpc.php {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ---- WordPress REST API rate limiting ------------------------------------
    location ~ ^/wp-json/ {
        limit_req zone=api burst=50 nodelay;
        try_files $uri $uri/ /index.php?$args;
    }
}
