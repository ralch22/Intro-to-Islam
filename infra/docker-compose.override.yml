# =============================================================================
# IntroToIslam — Local Development Overrides
# This file is automatically merged with docker-compose.yml by Docker Compose
# when both files are present in the same directory.
#
# Purpose: expose internal container ports directly on localhost so developers
# can connect to databases, admin UIs, and services without going through nginx.
#
# DO NOT use this file on the production VPS — it exposes ports that should
# remain internal-only in production.
# =============================================================================

version: "3.9"

services:

  # Expose MySQL directly for local DB clients (TablePlus, DBeaver, etc.)
  mysql:
    ports:
      - "3306:3306"
    environment:
      # Looser password validation during local dev
      MYSQL_ROOT_HOST: "%"

  # Expose PostgreSQL directly for local DB clients
  postgres:
    ports:
      - "5432:5432"

  # Expose Redis directly for local inspection (redis-cli, RedisInsight)
  redis:
    ports:
      - "6379:6379"

  # Expose Moodle directly (skip nginx SSL in dev)
  moodle:
    ports:
      - "8080:8080"
    environment:
      # Use http in local dev; remove SSLPROXY requirement
      MOODLE_HOST: localhost:8080
      MOODLE_SSLPROXY: "false"

  # Expose WordPress PHP-FPM — useful when running nginx locally outside Docker
  wordpress:
    ports:
      - "9000:9000"

  # Expose Cal.com directly
  calcom:
    ports:
      - "3001:3000"
    environment:
      NEXTAUTH_URL: http://localhost:3001
      NEXT_PUBLIC_WEBAPP_URL: http://localhost:3001

  # Expose Mautic directly
  mautic:
    ports:
      - "8081:80"
    environment:
      MAUTIC_SITE_URL: http://localhost:8081

  # Expose Prometheus UI directly
  prometheus:
    ports:
      - "9090:9090"

  # Expose Grafana directly
  grafana:
    ports:
      - "3002:3000"
    environment:
      GF_SERVER_ROOT_URL: http://localhost:3002
      # Disable login screen in local dev (comment out for security testing)
      # GF_AUTH_ANONYMOUS_ENABLED: "true"

  # Expose nginx on alternative ports to avoid conflicts with local web servers
  nginx:
    ports:
      - "8000:80"
      - "8443:443"
    volumes:
      # Mount local nginx config for rapid iteration without container rebuild
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
